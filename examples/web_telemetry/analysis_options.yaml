# Maximum-strictness analysis options for this example.
#
# This example is meant to demonstrate best practices, so we enable every
# lint rule that is not removed, deprecated, or in direct conflict with
# another enabled rule. Conflicts are resolved in favour of the Flutter
# repo's own analysis_options.yaml conventions.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

formatter:
  page_width: 100

linter:
  rules:
    # ── Type annotations ───────────────────────────────────────────────
    - always_declare_return_types
    # always_specify_types              # conflicts with omit_obvious_*
    - avoid_annotating_with_dynamic
    - avoid_types_on_closure_parameters
    # omit_local_variable_types         # superset of omit_obvious_*; conflicts with specify_nonobvious_*
    - omit_obvious_local_variable_types
    - omit_obvious_property_types
    - specify_nonobvious_local_variable_types
    - specify_nonobvious_property_types
    - strict_top_level_inference
    # type_annotate_public_apis           # conflicts with omit_obvious_property_types

    # ── Const / immutability ───────────────────────────────────────────
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_in_for_each
    - prefer_final_locals
    - prefer_final_parameters
    # avoid_final_parameters            # conflicts with prefer_final_parameters
    # unnecessary_final                 # conflicts with prefer_final_locals

    # ── Async ──────────────────────────────────────────────────────────
    - avoid_void_async
    - cancel_subscriptions
    - close_sinks
    - discarded_futures
    - unawaited_futures
    - unnecessary_async
    - unnecessary_await_in_return
    - unnecessary_unawaited

    # ── Error handling ─────────────────────────────────────────────────
    - avoid_catches_without_on_clauses
    - avoid_catching_errors
    - only_throw_errors
    - throw_in_finally

    # ── Style / formatting ─────────────────────────────────────────────
    - always_put_control_body_on_new_line
    - always_put_required_named_parameters_first
    - cascade_invocations
    - combinators_ordering
    - directives_ordering
    - eol_at_end_of_file
    - leading_newlines_in_multiline_strings
    # lines_longer_than_80_chars        # we format at page width 100
    - prefer_expression_function_bodies
    - require_trailing_commas
    - sort_constructors_first
    - sort_pub_dependencies
    - sort_unnamed_constructors_first
    - unnecessary_breaks
    - unnecessary_lambdas
    - unnecessary_library_directive
    - unnecessary_parenthesis
    - unnecessary_raw_strings

    # ── Strings / quotes ──────────────────────────────────────────────
    - avoid_escaping_inner_quotes
    - missing_whitespace_between_adjacent_strings
    - no_adjacent_strings_in_list
    - prefer_single_quotes
    # prefer_double_quotes              # conflicts with prefer_single_quotes

    # ── Imports ────────────────────────────────────────────────────────
    # always_use_package_imports        # conflicts with prefer_relative_imports
    - prefer_relative_imports

    # ── Null safety ────────────────────────────────────────────────────
    - avoid_futureor_void
    - cast_nullable_to_non_nullable
    - no_literal_bool_comparisons
    - prefer_null_aware_method_calls
    - prefer_void_to_null
    - tighten_type_of_initializing_formals
    - unnecessary_null_aware_operator_on_extension_on_nullable
    - unnecessary_null_checks
    - use_if_null_to_convert_nulls_to_bools

    # ── Boolean / conditional ──────────────────────────────────────────
    - avoid_bool_literals_in_conditional_expressions
    - literal_only_boolean_expressions
    - prefer_if_elements_to_conditional_expressions
    - use_is_even_rather_than_modulo

    # ── Class design ──────────────────────────────────────────────────
    - avoid_classes_with_only_static_members
    - avoid_equals_and_hash_code_on_mutable_classes
    - avoid_field_initializers_in_const_classes
    - avoid_implementing_value_types
    - avoid_multiple_declarations_per_line
    - avoid_positional_boolean_parameters
    - avoid_returning_this
    - avoid_setters_without_getters
    - avoid_unused_constructor_parameters
    - implicit_reopen
    - matching_super_parameters
    - one_member_abstracts
    - prefer_asserts_in_initializer_lists
    - prefer_constructors_over_static_methods
    - prefer_foreach
    - prefer_mixin
    - unsafe_variance
    - use_enums
    - use_setters_to_change_properties
    - use_to_and_as_if_applicable

    # ── Flutter-specific ──────────────────────────────────────────────
    - diagnostic_describe_all_properties
    - flutter_style_todos
    - sized_box_shrink_expand
    - use_colored_box
    - use_decorated_box

    # ── Documentation ─────────────────────────────────────────────────
    - comment_references
    - document_ignores
    - missing_code_block_language_in_doc_comment
    # package_api_docs                   # removed in Dart 3.7.0
    - public_member_api_docs

    # ── Performance / correctness ─────────────────────────────────────
    - avoid_double_and_int_checks
    - avoid_dynamic_calls
    - avoid_js_rounded_ints
    - avoid_private_typedef_functions
    - avoid_redundant_argument_values
    - avoid_slow_async_io
    - avoid_type_to_string
    # avoid_unstable_final_fields         # removed in recent Dart
    - conditional_uri_does_not_exist
    - deprecated_consistency
    - deprecated_member_use_from_same_package
    - do_not_use_environment
    - invalid_case_patterns
    - join_return_with_assignment
    - library_names
    - no_default_cases
    - no_runtimeType_toString
    - no_self_assignments
    - noop_primitive_operations
    - package_prefixed_library_names
    - parameter_assignments
    - prefer_asserts_with_message
    - prefer_int_literals
    - remove_deprecations_in_breaking_versions
    - simplify_variable_pattern
    - switch_on_type
    - test_types_in_equals
    - unnecessary_ignore
    - unnecessary_statements
    - unreachable_from_main
    - use_late_for_private_fields_and_variables
    - use_named_constants
    - use_raw_strings
    - use_string_buffers
    - use_test_throws_matchers
    - use_truncating_division

dart_code_linter:
  extends:
    - package:dart_code_linter/presets/all.yaml
    - package:dart_code_linter/presets/metrics_recommended.yaml
  metrics:
    # Flutter widget build methods naturally have high halstead volume
    # from nested widget constructor calls. The defaults from
    # metrics_recommended.yaml are tuned for imperative code, not
    # declarative widget trees.
    halstead-volume: 500
    maintainability-index: 40
    number-of-methods: 20
  metrics-exclude:
    - test/**
  rules:
    # Disabled: conflicts with sort_constructors_first — Dart convention
    # places constructors before fields.
    - member-ordering: false
    # Disabled: top-level functions are idiomatic Dart for conditional
    # imports (web_perf.dart / web_perf_stub.dart) and constants.
    - prefer-static-class: false
    # Disabled: main.dart contains the app entry point plus small page
    # widgets; telemetry_event.dart groups related data classes. Splitting
    # each into its own file would reduce cohesion.
    - prefer-match-file-name: false
    # Disabled: web_perf_stub.dart provides intentional no-op stubs whose
    # signatures must match web_perf.dart.
    - no-empty-block: false
    - avoid-unused-parameters: false
    # Disabled: small related widgets (HomePage, DetailPage) belong
    # together in a demo app.
    - prefer-single-widget-per-file: false
    # Disabled: µs (microsecond) is the standard symbol in performance
    # telemetry and is clearer than spelling out "us".
    - avoid-non-ascii-symbols: false
    # Disabled: too noisy for example code — spacing values (16) and
    # default buffer sizes (2000) are clear from context.
    - no-magic-number: false
    # Disabled: small inline callbacks are idiomatic in Flutter widget
    # trees and improve readability for this example.
    - prefer-extracting-callbacks: false
    # Disabled: named argument order matching parameter declaration order
    # is not a useful enforcement in Flutter widget constructors.
    - arguments-ordering: false
    # Disabled: runApp() return value is intentionally unused.
    - avoid-ignoring-return-values: false
    # Disabled: late is correct for deferred initialization via init()
    # in the singleton TelemetryService pattern.
    - avoid-late-keyword: false
